<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur de Couleurs</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    display: flex;
    min-height: 100vh;
    flex-direction: column;
    background-color: #fafafa;
    color: #222;
}

main {
    padding: 40px 20px;
    flex: 1;
    text-align: center;
}

h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

p {
    color: #555;
    margin-bottom: 25px;
}

.color-box {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

#colorPicker {
    width: 70px;
    height: 70px;
    border: none;
    cursor: pointer;
}

#preview {
    width: 110px;
    height: 110px;
    border-radius: 10px;
    border: 2px solid #ccc;
}

.codes {
    margin-top: 15px;
}

.code {
    background: #fff;
    display: inline-block;
    padding: 10px 18px;
    margin: 6px;
    border-radius: 6px;
    border: 1px solid #ddd;
    cursor: pointer;
}

.code:hover {
    background: #f0f0f0;
}

footer {
    background: #f0f0f0;
    text-align: center;
    padding: 12px 0;
    font-size: 0.9rem;
    color: #444;
    border-top: 1px solid #ddd;
}

footer a {
    color: #007bff;
    text-decoration: none;
}

footer a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<main>
    <h1>🎨 Convertisseur de Couleurs</h1>
    <p>Sélectionne une couleur pour obtenir ses codes</p>

    <div class="color-box">
        <input type="color" id="colorPicker" value="#ff0000">
        <div id="preview"></div>
    </div>

    <div class="codes">
        <div class="code" onclick="copy(hex)">HEX : <span id="hex">#FF0000</span></div>
        <div class="code" onclick="copy(rgb)">RGB : <span id="rgb">rgb(255, 0, 0)</span></div>
        <div class="code" onclick="copy(hsl)">HSL : <span id="hsl">hsl(0, 100%, 50%)</span></div>
        <p style="margin-top:10px;color:#666;">Clique sur un code pour le copier</p>
    </div>
</main>

<footer>
    © 2026 <a href="https://moi14212869.github.io/onelevel" target="_blank">Onelevel Studio</a>
</footer>

<script>
const picker = document.getElementById("colorPicker");
const preview = document.getElementById("preview");
const hex = document.getElementById("hex");
const rgb = document.getElementById("rgb");
const hsl = document.getElementById("hsl");

function update(color) {
    preview.style.background = color;
    hex.textContent = color.toUpperCase();

    const r = parseInt(color.substr(1,2),16);
    const g = parseInt(color.substr(3,2),16);
    const b = parseInt(color.substr(5,2),16);

    rgb.textContent = `rgb(${r}, ${g}, ${b})`;

    const hslVal = rgbToHsl(r,g,b);
    hsl.textContent = `hsl(${hslVal.h}, ${hslVal.s}%, ${hslVal.l}%)`;
}

function rgbToHsl(r,g,b){
    r/=255; g/=255; b/=255;
    let max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;

    if(max===min){h=s=0;}
    else{
        let d=max-min;
        s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){
            case r:h=(g-b)/d+(g<b?6:0);break;
            case g:h=(b-r)/d+2;break;
            case b:h=(r-g)/d+4;break;
        }
        h*=60;
    }
    return {h:Math.round(h),s:Math.round(s*100),l:Math.round(l*100)};
}

function copy(el){
    navigator.clipboard.writeText(el.textContent);
}

picker.addEventListener("input", e => update(e.target.value));
update(picker.value);
</script>

</body>
</html>
